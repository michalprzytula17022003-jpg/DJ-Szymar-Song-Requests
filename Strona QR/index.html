<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ Szymar - Zamów Piosenkę</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Garamond', 'Georgia', serif;
            background: #0a0a0a;
            min-height: 100vh;
            padding: 20px;
            color: #d4af37;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeIn 0.8s ease-in;
        }

        .logo {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
        }

        .logo-text {
            font-size: 2em;
            font-weight: 300;
            letter-spacing: 3px;
            color: #d4af37;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1em;
            color: #b8962e;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            margin: 20px auto;
        }

        .card {
            background: #1a1a1a;
            border: 1px solid #d4af37;
            border-radius: 10px;
            padding: 35px;
            box-shadow: 0 10px 40px rgba(212, 175, 55, 0.15);
            animation: slideUp 0.6s ease-out;
            margin-bottom: 30px;
        }

        .card-title {
            font-size: 1.5em;
            color: #d4af37;
            text-align: center;
            margin-bottom: 25px;
            letter-spacing: 2px;
            font-weight: 300;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #d4af37;
            font-size: 0.95em;
            letter-spacing: 1px;
            font-weight: 300;
        }

        input, textarea {
            width: 100%;
            padding: 14px 18px;
            background: #0a0a0a;
            border: 1px solid #4a4a4a;
            border-radius: 5px;
            font-size: 16px;
            color: #d4af37;
            font-family: 'Georgia', serif;
            transition: all 0.3s ease;
        }

        input::placeholder, textarea::placeholder {
            color: #6a6a6a;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 90px;
        }

        .button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #d4af37 0%, #b8962e 100%);
            color: #0a0a0a;
            border: none;
            border-radius: 5px;
            font-size: 1.05em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: 'Georgia', serif;
        }

        .button:hover {
            background: linear-gradient(135deg, #e6c24d 0%, #d4af37 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
        }

        .button:active {
            transform: translateY(0);
        }

        .requests-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .requests-title {
            color: #d4af37;
            font-size: 1.3em;
            letter-spacing: 2px;
            font-weight: 300;
        }

        .queue-count {
            background: linear-gradient(135deg, #d4af37 0%, #b8962e 100%);
            color: #0a0a0a;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .request-item {
            background: #0a0a0a;
            padding: 18px;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 3px solid #d4af37;
            animation: slideIn 0.4s ease-out;
            transition: all 0.3s ease;
            position: relative;
        }

        .request-item:hover {
            background: #151515;
            border-left-width: 4px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .status-pending {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            border: 1px solid #ffc107;
        }

        .status-playing {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid #4caf50;
        }

        .status-played {
            background: rgba(158, 158, 158, 0.2);
            color: #9e9e9e;
            border: 1px solid #9e9e9e;
        }

        .request-item.playing {
            background: linear-gradient(90deg, rgba(76, 175, 80, 0.1) 0%, rgba(26, 26, 26, 0.8) 100%);
            border-left-color: #4caf50;
        }

        .request-item.played {
            opacity: 0.6;
        }

        .request-song {
            font-weight: 400;
            color: #d4af37;
            font-size: 1.15em;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .request-artist {
            color: #b8962e;
            margin-bottom: 6px;
            font-size: 0.95em;
        }

        .request-name {
            color: #7a7a7a;
            font-size: 0.85em;
            font-style: italic;
        }

        .empty-queue {
            text-align: center;
            padding: 50px 20px;
            color: #6a6a6a;
        }

        .empty-queue-icon {
            font-size: 3.5em;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .success-message {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.2) 0%, rgba(76, 175, 80, 0.1) 100%);
            border: 1px solid #4caf50;
            color: #4caf50;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 25px;
            text-align: center;
            animation: slideDown 0.3s ease-out;
            letter-spacing: 1px;
        }

        .note {
            background: rgba(212, 175, 55, 0.05);
            border-left: 3px solid #d4af37;
            padding: 14px;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 0.85em;
            color: #b8962e;
            line-height: 1.6;
        }

        .music-notes {
            position: fixed;
            font-size: 2em;
            color: #d4af37;
            opacity: 0.1;
            pointer-events: none;
        }

        .note1 { top: 10%; left: 5%; }
        .note2 { top: 70%; right: 8%; }
        .note3 { bottom: 15%; left: 10%; }

        .playing-icon {
            display: inline-block;
            margin-right: 5px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .logo-text {
                font-size: 1.5em;
            }
            
            .card {
                padding: 25px;
            }

            .logo {
                width: 120px;
                height: 120px;
            }
        }
    </style>
</head>
<body>
    <!-- Decorative music notes -->
    <div class="music-notes note1">♪</div>
    <div class="music-notes note2">♫</div>
    <div class="music-notes note3">♪</div>

    <div class="container">
        <div class="logo-section">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Ccircle cx='100' cy='100' r='90' fill='none' stroke='%23d4af37' stroke-width='2'/%3E%3Cpath d='M40 80 Q60 70 80 80 L90 90 Q95 95 100 90 L110 80 Q130 70 150 80' fill='none' stroke='%23d4af37' stroke-width='2'/%3E%3Ccircle cx='50' cy='90' r='4' fill='%23d4af37'/%3E%3Ccircle cx='85' cy='95' r='4' fill='%23d4af37'/%3E%3Ccircle cx='115' cy='95' r='4' fill='%23d4af37'/%3E%3Ccircle cx='145' cy='90' r='4' fill='%23d4af37'/%3E%3Ctext x='100' y='130' font-family='Georgia, serif' font-size='80' fill='%23d4af37' text-anchor='middle' font-weight='300'%3EDJ%3C/text%3E%3C/svg%3E" alt="DJ Szymar" class="logo">
            <div class="logo-text">DJ & Wodzirej</div>
            <div class="subtitle">Szymar</div>
            <div class="divider"></div>
        </div>

        <div class="card">
            <h2 class="card-title">Zamów Piosenkę</h2>
            
            <div id="successMessage" style="display: none;" class="success-message">
                ✓ Twoje zamówienie zostało dodane do kolejki
            </div>

            <form id="songRequestForm">
                <div class="form-group">
                    <label for="songTitle">♫ Tytuł Utworu</label>
                    <input 
                        type="text" 
                        id="songTitle" 
                        name="songTitle" 
                        placeholder="np. Dancing Queen"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="artist">♪ Wykonawca</label>
                    <input 
                        type="text" 
                        id="artist" 
                        name="artist" 
                        placeholder="np. ABBA"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="requesterName">Twoje Imię (opcjonalnie)</label>
                    <input 
                        type="text" 
                        id="requesterName" 
                        name="requesterName" 
                        placeholder="np. Anna"
                    >
                </div>

                <div class="form-group">
                    <label for="notes">Dedykacja lub Uwagi (opcjonalnie)</label>
                    <textarea 
                        id="notes" 
                        name="notes" 
                        placeholder="np. Na urodziny Kasi!"
                    ></textarea>
                </div>

                <button type="submit" class="button">
                    Zamów Utwór
                </button>
            </form>

            <div class="note">
                DJ Szymar dokłada wszelkich starań, aby spełnić Twoje muzyczne życzenia. Kolejność utworów może się różnić w zależności od atmosfery imprezy.
            </div>
        </div>

        <div class="card">
            <div class="requests-header">
                <h2 class="requests-title">Kolejka Utworów</h2>
                <span class="queue-count" id="queueCount">0</span>
            </div>
            
            <div id="requestsList">
                <div class="empty-queue">
                    <div class="empty-queue-icon">♪</div>
                    <p>Kolejka jest pusta. Bądź pierwszy!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize storage
        let requests = [];

        // Load requests from storage on page load
        async function loadRequests() {
            try {
                const result = await window.storage.get('dj-szymar-requests', true);
                if (result && result.value) {
                    requests = JSON.parse(result.value);
                    renderRequests();
                }
            } catch (error) {
                console.log('No existing requests found');
                requests = [];
            }
        }

        // Save requests to storage
        async function saveRequests() {
            try {
                await window.storage.set('dj-szymar-requests', JSON.stringify(requests), true);
            } catch (error) {
                console.error('Error saving requests:', error);
            }
        }

        // Handle form submission
        document.getElementById('songRequestForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                id: Date.now(),
                songTitle: document.getElementById('songTitle').value.trim(),
                artist: document.getElementById('artist').value.trim(),
                requesterName: document.getElementById('requesterName').value.trim() || 'Gość',
                notes: document.getElementById('notes').value.trim(),
                timestamp: new Date().toISOString(),
                status: 'pending' // pending, playing, played
            };

            // Add to requests array
            requests.push(formData);
            
            // Save to storage
            await saveRequests();

            // Show success message
            const successMsg = document.getElementById('successMessage');
            successMsg.style.display = 'block';
            setTimeout(() => {
                successMsg.style.display = 'none';
            }, 3000);

            // Reset form
            this.reset();

            // Render updated list
            renderRequests();
        });

        // Render requests list
        function renderRequests() {
            const requestsList = document.getElementById('requestsList');
            const queueCount = document.getElementById('queueCount');
            
            // Filter out played songs older than 1 hour for guests
            const activeRequests = requests.filter(req => {
                if (req.status !== 'played') return true;
                const hourAgo = new Date(Date.now() - 60 * 60 * 1000);
                return new Date(req.timestamp) > hourAgo;
            });

            if (activeRequests.length === 0) {
                requestsList.innerHTML = `
                    <div class="empty-queue">
                        <div class="empty-queue-icon">♪</div>
                        <p>Kolejka jest pusta. Bądź pierwszy!</p>
                    </div>
                `;
                queueCount.textContent = '0';
                return;
            }

            // Sort: playing first, then pending by timestamp, then played
            const sortedRequests = [...activeRequests].sort((a, b) => {
                if (a.status === 'playing') return -1;
                if (b.status === 'playing') return 1;
                if (a.status === 'pending' && b.status === 'played') return -1;
                if (a.status === 'played' && b.status === 'pending') return 1;
                return new Date(b.timestamp) - new Date(a.timestamp);
            });

            const pendingCount = activeRequests.filter(r => r.status === 'pending').length;

            requestsList.innerHTML = sortedRequests.map(request => {
                let statusBadge = '';
                let statusClass = '';
                
                if (request.status === 'playing') {
                    statusBadge = '<span class="status-badge status-playing"><span class="playing-icon">♫</span> Teraz Gra</span>';
                    statusClass = 'playing';
                } else if (request.status === 'played') {
                    statusBadge = '<span class="status-badge status-played">✓ Zagrane</span>';
                    statusClass = 'played';
                } else {
                    statusBadge = '<span class="status-badge status-pending">⏳ Oczekuje</span>';
                }

                return `
                    <div class="request-item ${statusClass}">
                        ${statusBadge}
                        <div class="request-song">${escapeHtml(request.songTitle)}</div>
                        <div class="request-artist">♪ ${escapeHtml(request.artist)}</div>
                        <div class="request-name">Zamówił(a): ${escapeHtml(request.requesterName)}</div>
                        ${request.notes ? `<div class="request-name" style="margin-top: 6px;">"${escapeHtml(request.notes)}"</div>` : ''}
                    </div>
                `;
            }).join('');

            queueCount.textContent = pendingCount;
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load requests when page loads
        loadRequests();

        // Refresh requests every 3 seconds to show updates from DJ
        setInterval(loadRequests, 3000);
    </script>
</body>
</html>
